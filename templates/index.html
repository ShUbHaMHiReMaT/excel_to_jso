<!DOCTYPE html>
<html>
<head>
    <title>Excel to JSON Converter</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
            background:#f4f4f4;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            color:#333;
        }

        input[type=file]{
            margin:20px;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .download-btn{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:green;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .download-btn:hover{
            background:darkgreen;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Excel to JSON Converter</h2>

    <form action="/convert" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".xlsx,.xls" required>
        <br>
        <button type="submit">Convert to JSON</button>
    </form>

    {% if download_ready %}
        <br>
        <a class="download-btn"
           href="{{ url_for('download', filename=download_file) }}">
           Download JSON
        </a>
    {% endif %}

</div>

</body>
</html>
